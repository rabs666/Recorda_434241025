<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recorda — Demo Reel</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700,800|dm-sans:400,500,600,700|space-mono:400,700" rel="stylesheet">
<style>
:root{
  --ink:#161311; --cream:#fbf7f1; --cream2:#f4ede3; --cream3:#e6d7c8;
  --terra:#c75b35; --terra-d:#b14828; --olive:#6a7a4b; --brown:#3b2416;
  --muted:#6d5f56;
  --font-display:"Playfair Display",serif;
  --font-ui:"DM Sans",sans-serif;
  --font-mono:"Space Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-ui); color:var(--ink); overflow:hidden;
  background:
    radial-gradient(circle at 18% 8%, rgba(199,91,53,.22), transparent 46%),
    radial-gradient(circle at 82% 4%, rgba(106,122,75,.18), transparent 44%),
    radial-gradient(circle at 72% 88%, rgba(199,91,53,.14), transparent 52%),
    repeating-linear-gradient(120deg, rgba(22,19,17,.035), rgba(22,19,17,.035) 1px, transparent 1px, transparent 8px),
    linear-gradient(180deg,#fbf7f1,#efe6da);
}
.stage{
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:30px; padding:42px 48px 96px;
}

/* ---------- top caption ---------- */
.head{
  position:absolute; top:30px; left:0; right:0; text-align:center; z-index:5;
  pointer-events:none;
}
.brand{
  display:inline-flex; align-items:center; gap:11px; margin-bottom:14px;
}
.brand .dot{
  width:34px;height:34px;border-radius:50%;
  background:conic-gradient(from 210deg,var(--ink),#2b231d 30%,var(--terra) 75%,var(--ink));
  box-shadow:0 0 0 4px var(--cream), 0 0 0 5px rgba(22,19,17,.12);
  position:relative;
}
.brand .dot::after{content:"";position:absolute;inset:13px;border-radius:50%;background:var(--cream);box-shadow:inset 0 0 0 2px rgba(22,19,17,.25)}
.brand h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.01em}
.cap{
  font-family:var(--font-display); font-size:30px; font-weight:700; letter-spacing:-.01em;
  opacity:0; transform:translateY(8px); transition:all .28s cubic-bezier(.16,1,.3,1);
}
.cap.show{opacity:1;transform:none}
.sub{
  margin-top:6px;font-size:14px;color:var(--muted);
  opacity:0;transform:translateY(8px);transition:all .28s .03s cubic-bezier(.16,1,.3,1);
}
.sub.show{opacity:1;transform:none}

/* ---------- devices ---------- */
.devices{display:flex;align-items:center;justify-content:center;gap:54px;width:100%;flex:1;min-height:0;margin-top:70px}

/* laptop */
.laptop{position:relative;transition:transform .42s cubic-bezier(.16,1,.3,1),filter .42s,opacity .42s}
.laptop .screen{
  width:920px;height:575px;border-radius:18px;background:#0e0c0b;
  padding:14px;box-shadow:0 40px 90px rgba(22,19,17,.30),0 0 0 2px #1c1714, inset 0 0 0 1px rgba(255,255,255,.05);
}
.laptop .glass{width:100%;height:100%;border-radius:7px;overflow:hidden;background:var(--cream);position:relative}
.laptop .base{
  width:1040px;height:22px;margin:0 auto;border-radius:0 0 16px 16px;
  background:linear-gradient(180deg,#c9c2bb,#9a928b);
  box-shadow:0 18px 30px rgba(22,19,17,.25);position:relative;left:-60px;
}
.laptop .base::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:9px;border-radius:0 0 10px 10px;background:#7d756e}

/* phone */
.phone{position:relative;transition:transform .42s cubic-bezier(.16,1,.3,1),filter .42s,opacity .42s}
.phone .body{
  width:248px;height:520px;border-radius:42px;background:#0e0c0b;padding:11px;
  box-shadow:0 40px 80px rgba(22,19,17,.32),0 0 0 2px #1c1714, inset 0 0 0 1px rgba(255,255,255,.05);
  position:relative;
}
.phone .body::before{content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);width:78px;height:20px;border-radius:14px;background:#0e0c0b;z-index:3}
.phone .glass{width:100%;height:100%;border-radius:32px;overflow:hidden;background:var(--cream);position:relative}

/* iframe scaling wrappers */
.frame-wrap{position:absolute;inset:0;overflow:hidden}
iframe{border:0;position:absolute;top:0;left:0;background:var(--cream)}
/* desktop: render 1440 wide scaled to 892px screen (892/1440 = .6194) */
.laptop iframe{width:1440px;height:928px;transform:scale(.6194);transform-origin:top left}
/* phone: render 390 wide scaled to 226px screen (226/390 = .5795) */
.phone iframe{width:390px;height:898px;transform:scale(.5795);transform-origin:top left}

.frame-wrap iframe{opacity:0;transition:opacity .28s ease}
.frame-wrap.in iframe{opacity:1}

/* focus states */
.devices.focus-desktop .phone{transform:scale(.86) translateX(18px);filter:saturate(.85) brightness(.96);opacity:.78}
.devices.focus-mobile .laptop{transform:scale(.92) translateX(-22px);filter:saturate(.85) brightness(.96);opacity:.8}

/* loading shimmer */
.shimmer{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0;transition:opacity .3s;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.5) 50%,transparent 70%);
  background-size:220% 100%;animation:sh 1.1s linear infinite}
.frame-wrap.loading .shimmer{opacity:.65}
@keyframes sh{0%{background-position:120% 0}100%{background-position:-120% 0}}

/* ---------- controls / progress ---------- */
.bar{
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:6;
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(10px);
  border:1px solid rgba(22,19,17,.1);border-radius:999px;padding:9px 16px;
  box-shadow:0 18px 40px rgba(22,19,17,.14);
}
.bar button{
  border:0;background:transparent;cursor:pointer;color:var(--ink);
  width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
  font-size:15px;transition:background .15s;
}
.bar button:hover{background:var(--cream3)}
.bar .play{background:var(--terra);color:#fff;width:40px;height:40px}
.bar .play:hover{background:var(--terra-d)}
.dots{display:flex;gap:7px;align-items:center}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--cream3);cursor:pointer;transition:all .25s}
.dots i.on{background:var(--terra);width:22px;border-radius:5px}
.scene-no{font-family:var(--font-mono);font-size:12px;color:var(--muted);min-width:46px;text-align:center}

.progress{position:absolute;top:0;left:0;height:3px;background:var(--terra);width:0;z-index:7;transition:width .12s linear}

.hint{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted);font-family:var(--font-mono);letter-spacing:.04em;z-index:6;opacity:.7}
</style>
</head>
<body>
<div class="progress" id="prog"></div>

<div class="stage">
  <div class="head">
    <div class="brand"><span class="dot"></span><h1>Recorda</h1></div>
    <div class="cap" id="cap">Music Record Store</div>
    <div class="sub" id="sub">Beranda</div>
  </div>

  <div class="devices focus-desktop" id="devices">
    <div class="laptop">
      <div class="screen"><div class="glass">
        <div class="frame-wrap loading" id="wd">
          <iframe id="fd" title="desktop" scrolling="no"></iframe>
          <div class="shimmer"></div>
        </div>
      </div></div>
      <div class="base"></div>
    </div>

    <div class="phone">
      <div class="body"><div class="glass">
        <div class="frame-wrap loading" id="wm">
          <iframe id="fm" title="mobile" scrolling="no"></iframe>
          <div class="shimmer"></div>
        </div>
      </div></div>
    </div>
  </div>
</div>

<div class="bar">
  <button id="prev" title="Sebelumnya">⏮</button>
  <button class="play" id="play" title="Play/Pause">⏸</button>
  <button id="next" title="Berikutnya">⏭</button>
  <span class="scene-no" id="sceneNo">1 / 8</span>
  <div class="dots" id="dots"></div>
</div>
<div class="hint">Tekan Spasi = play/pause · ← → ganti scene · Buka layar penuh (F11) lalu rekam layar untuk video</div>

<script>

// Pengali lama tampil tiap layar (1 = default, 1.5 = 50% lebih lama). Ubah di sini saja.
const HOLD = 1.55;

/* ----- Mockup halaman ADMIN (statis, pakai CSS asli Recorda) -----
   Halaman admin butuh login, jadi iframe-live akan ke-redirect ke /login.
   Solusinya: render markup admin asli + data contoh dari seeder, pakai recorda.css live. */

<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700,800|dm-sans:400,500,600,700|space-mono:400,700" rel="stylesheet">
<link rel="stylesheet" href="${BASE}/recorda.css">
</head><body class="recorda-body admin-body">
<div class="admin-shell">
  <aside class="admin-sidenav">
    <div class="admin-brand">
      <img class="logo-symbol" src="${BASE}/recorda-logo.svg" alt="Recorda logo">
      <div class="admin-brand__text"><span class="logo-text">Recorda</span><span class="admin-subtitle">Admin Panel</span></div>
    </div>
    <nav class="admin-menu">${links}</nav>
    <div class="admin-footer"><p class="muted">Terakhir update</p><p class="mono">25 Mei 2026</p></div>
  </aside>
  <div class="admin-content">
    <div class="admin-topbar">
      <div class="admin-topbar__title">${pageTitle}</div>
      <div class="admin-topbar__actions">
        <a class="btn btn-light btn-compact" href="#">Lihat Situs</a>
        <button class="admin-account" type="button">Admin Recorda · Keluar</button>
      </div>
    </div>
    <main class="admin-page">${content}</main>
  </div>
</div></body></html>`;
}
function statCard(label,val,note){return `<div class="stat-card"><p class="muted">${label}</p><h3>${val}</h3>${note?`<p class="mono">${note}</p>`:""}</div>`;}
function badge(status){const m={selesai:"is-success",diproses:"is-warning",dikirim:"is-info",dibatalkan:"is-danger",menunggu:"is-pending"};const t=status.charAt(0).toUpperCase()+status.slice(1);return `<span class="status-badge ${m[status]||'is-pending'}">${t}</span>`;}

const ADMIN_DASHBOARD = adminShell("Dashboard","dashboard",`

      <div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btn-light btn-compact is-active" type="button">7 Hari</button><button class="btn btn-light btn-compact" type="button">30 Hari</button><button class="btn btn-light btn-compact" type="button">90 Hari</button></div>
    </div>
    <div class="chart-placeholder" style="display:flex;align-items:flex-end;gap:14px;padding:20px;height:200px;">

    </div>
  </div>

</div>
<div class="panel">
  <div class="panel-head"><h2>Transaksi Terbaru</h2></div>

    ${[["REC-048","Andy Rafaela","16 Jun 2026","Rp 320.000","selesai"],["REC-047","Budi Santoso","15 Jun 2026","Rp 410.000","diproses"],["REC-046","Sari Dewi","15 Jun 2026","Rp 640.000","menunggu"],["REC-045","Cahyo Pratama","14 Jun 2026","Rp 250.000","dikirim"]].map(o=>`<div class="table-row columns-6"><div class="mono">#${o[0]}</div><div>${o[1]}</div><div>${o[2]}</div><div class="mono">${o[3]}</div><div>${badge(o[4])}</div><div><a class="btn btn-light btn-compact" href="#">Kelola</a></div></div>`).join("")}
  </div></div>
</div>`);

    ["armageddon.svg","aespa - Armageddon","CD","K-Pop","Rp 195.000","3","Rendah","is-warning"],

</div>
<div class="admin-tools"><input class="input" type="search" placeholder="Order ID / Nama..."></div>
<div class="panel"><div class="admin-table-scroll"><div class="table">

  ${[

    ["REC-047","Budi Santoso","Blue Train ×1","15 Jun 2026","Rp 410.000","diproses"],
    ["REC-046","Sari Dewi","The Album ×1, Abbey Road ×1","15 Jun 2026","Rp 640.000","menunggu"],

const ADMIN_ARTIKEL = adminShell("Kelola Artikel","artikel",`
<div class="admin-tools"><input class="input" type="search" placeholder="Cari judul artikel..."></div>
<div class="panel"><div class="admin-table-scroll"><div class="table">

/* ----- Mockup halaman USER (butuh login: Pembayaran, History, Profil, Ubah Sandi) -----
   Pakai header+footer asli + recorda.css live, jadi mandiri tanpa perlu login. */
function publicShell(bodyClass, navActive, content, extraCss){
  const nav=[["Beranda","beranda"],["Artikel","artikel"],["Katalog","katalog"],["Keranjang","keranjang"]];
  const links=nav.map(n=>`<a class="nav-link ${n[1]===navActive?'active':''}" href="#">${n[0]}</a>`).join("");
  return `<!doctype html><html lang="id"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700,800|dm-sans:400,500,600,700|space-mono:400,700" rel="stylesheet">
<link rel="stylesheet" href="${BASE}/recorda.css">
${extraCss?`<style>${extraCss}</style>`:""}
</head><body class="recorda-body ${bodyClass}">
<header class="site-header"><div class="site-header__inner">
  <a class="logo" href="#"><img class="logo-symbol" src="${BASE}/recorda-logo.svg" alt="Recorda logo"><span class="logo-text">Recorda</span></a>
  <nav class="site-nav">${links}</nav>
  <div class="site-actions">
    <a class="icon-button" href="#" aria-label="Cari"><span class="search-icon"></span></a>
    <button class="btn btn-ghost" type="button"><span style="display:inline-block;width:18px;height:18px;margin-right:8px;background:currentColor;border-radius:50%;"></span>Pengguna Recorda</button>
  </div>
</div></header>
<main class="recorda-page">${content}</main>

const fd=document.getElementById('fd'), fm=document.getElementById('fm');
const wd=document.getElementById('wd'), wm=document.getElementById('wm');
const cap=document.getElementById('cap'), sub=document.getElementById('sub');
const devices=document.getElementById('devices');
const prog=document.getElementById('prog');
const dotsBox=document.getElementById('dots');
const sceneNo=document.getElementById('sceneNo');
const playBtn=document.getElementById('play');

let i=0, playing=true, raf=null, sceneStart=0, lastKey={d:null,m:null};

// build dots
SCENES.forEach((_,k)=>{const d=document.createElement('i');d.onclick=()=>go(k);dotsBox.appendChild(d);});
const dots=[...dotsBox.children];

function sceneKey(s){ return s.html ? ("html:"+s.cap) : ("url:"+s.path); }

function loadFrame(frame,wrap,s){
  wrap.classList.add('loading'); wrap.classList.remove('in');
  frame.onload=()=>{ wrap.classList.remove('loading'); wrap.classList.add('in'); };
  if(s.html){ frame.removeAttribute('src'); frame.srcdoc=s.html; }
  else { frame.removeAttribute('srcdoc'); frame.src=BASE+s.path; }
}

function render(){
  const s=SCENES[i];
  const key=sceneKey(s);
  // captions
  cap.classList.remove('show'); sub.classList.remove('show');
  setTimeout(()=>{cap.textContent=s.cap; sub.textContent=s.sub; cap.classList.add('show'); sub.classList.add('show');},60);
  // focus
  devices.className='devices focus-'+s.focus;
  // load frames only if konten berubah (hindari reload sia-sia)
  if(lastKey.d!==key){ loadFrame(fd,wd,s); lastKey.d=key; }
  if(lastKey.m!==key){ loadFrame(fm,wm,s); lastKey.m=key; }
  // dots + counter
  dots.forEach((d,k)=>d.classList.toggle('on',k===i));
  sceneNo.textContent=(i+1)+" / "+SCENES.length;
  sceneStart=performance.now();
}

function tick(now){
  if(!playing){raf=requestAnimationFrame(tick);return;}
  const s=SCENES[i];
  const p=Math.min(1,(now-sceneStart)/(s.dur*HOLD));
  prog.style.width=(p*100)+"%";
  if(p>=1){ next(); }
  raf=requestAnimationFrame(tick);
}

function go(k){ i=(k+SCENES.length)%SCENES.length; prog.style.width="0"; render(); }
function next(){ go(i+1); }
function prev(){ go(i-1); }
function toggle(){ playing=!playing; playBtn.textContent=playing?"⏸":"▶"; if(playing)sceneStart=performance.now()-( (performance.now()-sceneStart) ); }

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
playBtn.onclick=toggle;
window.addEventListener('keydown',e=>{
  if(e.code==="Space"){e.preventDefault();toggle();}
  if(e.code==="ArrowRight")next();
  if(e.code==="ArrowLeft")prev();
});

render();
raf=requestAnimationFrame(tick);
</script>
